name: Build & Release Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Read version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' WeightRecall.App/WeightRecall.App.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Fail if tag already exists
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "ERROR: Tag v${{ steps.version.outputs.version }} already exists. Update ApplicationDisplayVersion in the csproj before pushing."
            exit 1
          fi

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/keystore.jks

      - name: Build APK
        run: |
          dotnet publish WeightRecall.App/WeightRecall.App.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion="${{ steps.version.outputs.version }}" \
            -p:ApplicationVersion="${{ github.run_number }}" \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="${{ github.workspace }}/keystore.jks" \
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASS }}" \
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_STORE_PASS }}"

      - name: Find APK
        id: find_apk
        run: |
          SIGNED=$(find . -name "*-Signed.apk" | head -1)
          APK=$(find . -name "*.apk" | head -1)
          FINAL=${SIGNED:-$APK}
          echo "apk_path=$FINAL" >> $GITHUB_OUTPUT
          echo "Found APK: $FINAL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "WeightRecall v${{ steps.version.outputs.version }}"
          files: ${{ steps.find_apk.outputs.apk_path }}
          body: ${{ steps.commit.outputs.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
